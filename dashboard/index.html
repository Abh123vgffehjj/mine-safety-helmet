<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>⛏ Mine Safety Control Room</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg:        #040a0f;
      --panel:     #07121d;
      --card:      #091825;
      --border:    #0e3654;
      --glow:      #1166aa;
      --safe:      #00e676;
      --warn:      #ffca28;
      --danger:    #ff1744;
      --offline:   #546e7a;
      --accent:    #00b8d4;
      --text:      #e8f4f8;
      --mid:       #7aafca;
      --dim:       #3a6880;
      --mono:      'Share Tech Mono', monospace;
      --ui:        'Rajdhani', sans-serif;
      --disp:      'Orbitron', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--ui); overflow-x: hidden; }
    body::after { content:''; position:fixed; inset:0; background:repeating-linear-gradient(to bottom,transparent 0,transparent 3px,rgba(0,0,0,.07) 3px,rgba(0,0,0,.07) 4px); pointer-events:none; z-index:9999; }

    /* ── HEADER ── */
    header { display:flex; align-items:center; justify-content:space-between; padding:12px 24px; background:linear-gradient(90deg,#040d15,#071828,#040d15); border-bottom:1px solid var(--glow); position:sticky; top:0; z-index:100; }
    .logo { display:flex; align-items:center; gap:12px; }
    .logo-icon { font-size:26px; animation:pulse-icon 3s ease-in-out infinite; }
    @keyframes pulse-icon { 0%,100%{filter:drop-shadow(0 0 6px var(--accent))} 50%{filter:drop-shadow(0 0 16px var(--accent))} }
    .title { font-family:var(--disp); font-size:16px; color:var(--accent); letter-spacing:2px; text-shadow:0 0 12px rgba(0,184,212,.5); }
    .subtitle { font-family:var(--mono); font-size:9px; color:var(--dim); letter-spacing:3px; margin-top:2px; }
    .hright { display:flex; align-items:center; gap:16px; }
    .conn-dot { width:9px; height:9px; border-radius:50%; background:var(--safe); box-shadow:0 0 8px var(--safe); animation:blink-dot 2s step-start infinite; }
    @keyframes blink-dot { 50%{opacity:.3} }
    .clock { font-family:var(--mono); font-size:14px; color:var(--mid); }
    .btn { padding:6px 14px; background:transparent; border:1px solid var(--accent); color:var(--accent); font-family:var(--mono); font-size:10px; letter-spacing:1px; cursor:pointer; transition:all .2s; }
    .btn:hover { background:var(--accent); color:var(--bg); }
    .btn.danger-btn { border-color:var(--danger); color:var(--danger); }
    .btn.danger-btn:hover { background:var(--danger); color:#fff; }

    /* ── STAT BAR ── */
    .statbar { display:flex; border-bottom:1px solid var(--border); }
    .stat { flex:1; padding:10px 18px; border-right:1px solid var(--border); display:flex; align-items:center; gap:10px; }
    .stat:last-child { border-right:none; }
    .stat-lbl { font-family:var(--mono); font-size:8px; color:var(--dim); letter-spacing:2px; }
    .stat-val { font-family:var(--disp); font-size:20px; color:var(--accent); }
    .stat-val.red   { color:var(--danger); text-shadow:0 0 8px var(--danger); }
    .stat-val.yellow{ color:var(--warn); }
    .stat-val.grey  { color:var(--offline); }

    /* ── LAYOUT ── */
    .main { display:grid; grid-template-columns:1fr 320px; height:calc(100vh - 104px); }

    /* ── MINER GRID ── */
    .miners { padding:18px; overflow-y:auto; }
    .sec-hdr { font-family:var(--mono); font-size:9px; letter-spacing:3px; color:var(--dim); margin-bottom:14px; display:flex; align-items:center; gap:8px; }
    .sec-hdr::after { content:''; flex:1; height:1px; background:var(--border); }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(270px,1fr)); gap:12px; }

    /* ── MINER CARD ── */
    .card { background:var(--card); border:1px solid var(--border); padding:14px; position:relative; overflow:hidden; transition:border-color .3s; }
    .card::before { content:''; position:absolute; top:0; left:0; width:3px; height:100%; background:var(--safe); transition:background .3s; }
    .card.warn::before   { background:var(--warn); }
    .card.danger::before { background:var(--danger); }
    .card.offline::before{ background:var(--offline); }
    .card.danger { border-color:var(--danger); animation:blink-card 1s step-start infinite; }
    @keyframes blink-card {
      0%  { box-shadow:0 0 20px rgba(255,23,68,.35); border-color:var(--danger); }
      50% { box-shadow:none; border-color:var(--card); }
      100%{ box-shadow:0 0 20px rgba(255,23,68,.35); border-color:var(--danger); }
    }
    .card.offline { border-color:var(--offline); opacity:.6; animation:none; }

    .card-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
    .miner-id { font-family:var(--disp); font-size:12px; color:var(--accent); letter-spacing:2px; }
    .badge { padding:3px 9px; font-family:var(--mono); font-size:8px; letter-spacing:2px; }
    .badge.WORKING  { background:rgba(0,230,118,.12); color:var(--safe); border:1px solid var(--safe); }
    .badge.IDLE     { background:rgba(255,202,40,.12); color:var(--warn); border:1px solid var(--warn); }
    .badge.CRITICAL { background:rgba(255,23,68,.18); color:var(--danger); border:1px solid var(--danger); animation:flash .5s alternate infinite; }
    .badge.OFFLINE  { background:rgba(84,110,122,.15); color:var(--offline); border:1px solid var(--offline); }
    @keyframes flash { from{opacity:1} to{opacity:.35} }

    .metrics { display:grid; grid-template-columns:1fr 1fr; gap:7px; margin-bottom:10px; }
    .metric { background:rgba(0,0,0,.3); padding:7px 9px; border:1px solid rgba(14,54,84,.5); }
    .mlbl { font-family:var(--mono); font-size:7px; color:var(--dim); letter-spacing:2px; }
    .mval { font-family:var(--mono); font-size:17px; font-weight:bold; color:var(--text); line-height:1.2; }
    .mval.safe   { color:var(--safe); }
    .mval.warn   { color:var(--warn); }
    .mval.danger { color:var(--danger); text-shadow:0 0 6px var(--danger); }
    .mval.grey   { color:var(--offline); font-size:12px; margin-top:3px; }
    .munit { font-size:8px; color:var(--dim); margin-left:2px; }

    /* health bar */
    .hbar-wrap { margin-bottom:10px; }
    .hbar-hdr  { display:flex; justify-content:space-between; font-family:var(--mono); font-size:8px; color:var(--dim); margin-bottom:4px; }
    .hbar-track{ height:5px; background:rgba(0,0,0,.4); border:1px solid var(--border); overflow:hidden; }
    .hbar-fill { height:100%; transition:width .8s ease,background .5s; }

    /* alert tags + dismiss */
    .alert-row { display:flex; align-items:flex-start; flex-wrap:wrap; gap:4px; margin-bottom:8px; min-height:4px; }
    .atag { font-family:var(--mono); font-size:7px; color:var(--danger); padding:2px 5px; border:1px solid rgba(255,23,68,.4); background:rgba(255,23,68,.08); }
    .atag.warn-tag { color:var(--warn); border-color:rgba(255,202,40,.4); background:rgba(255,202,40,.06); }

    /* DISMISS BUTTON */
    .dismiss-btn { margin-top:6px; width:100%; padding:5px; background:rgba(255,23,68,.1); border:1px solid var(--danger); color:var(--danger); font-family:var(--mono); font-size:9px; letter-spacing:1px; cursor:pointer; transition:all .2s; }
    .dismiss-btn:hover { background:var(--danger); color:#fff; }
    .acked-badge { font-family:var(--mono); font-size:8px; color:var(--safe); letter-spacing:1px; padding:4px 8px; border:1px solid rgba(0,230,118,.3); background:rgba(0,230,118,.06); text-align:center; margin-top:6px; }

    /* offline overlay text */
    .offline-msg { font-family:var(--mono); font-size:10px; color:var(--offline); text-align:center; padding:8px 0; letter-spacing:2px; }

    .ts { font-family:var(--mono); font-size:7px; color:var(--dim); text-align:right; margin-top:6px; }

    /* ── SIDEBAR ── */
    .sidebar { border-left:1px solid var(--border); overflow-y:auto; display:flex; flex-direction:column; }
    .chartpanel { padding:16px; border-bottom:1px solid var(--border); }
    .chtitle { font-family:var(--mono); font-size:8px; letter-spacing:3px; color:var(--dim); margin-bottom:10px; }
    .chbox { height:150px; position:relative; }

    .logpanel { flex:1; padding:16px; overflow-y:auto; }
    .logtitle { font-family:var(--mono); font-size:8px; letter-spacing:3px; color:var(--dim); margin-bottom:10px; }
    .logentry { font-family:var(--mono); font-size:9px; color:var(--mid); padding:5px 7px; border-left:2px solid var(--border); margin-bottom:3px; animation:slide-in .3s ease; }
    .logentry.danger { border-left-color:var(--danger); color:#ff8a80; }
    .logentry.warn   { border-left-color:var(--warn);   color:#ffe082; }
    .logentry.info   { border-left-color:var(--accent); }
    .logentry.ack    { border-left-color:var(--safe);   color:var(--safe); }
    @keyframes slide-in { from{transform:translateX(20px);opacity:0} to{transform:translateX(0);opacity:1} }
    .ltime { color:var(--dim); font-size:7px; display:block; margin-top:1px; }

    /* no data */
    .nodata { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; padding:60px 30px; text-align:center; color:var(--dim); }
    .nodata-icon { font-size:44px; opacity:.4; }
    .nodata h3 { font-family:var(--disp); font-size:13px; letter-spacing:2px; color:var(--mid); }
    .nodata p  { font-family:var(--mono); font-size:9px; line-height:1.8; }

    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-track { background:var(--bg); }
    ::-webkit-scrollbar-thumb { background:var(--glow); }

    @media(max-width:860px){
      .main { grid-template-columns:1fr; height:auto; }
      .sidebar { border-left:none; border-top:1px solid var(--border); }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-icon">⛏</span>
    <div>
      <div class="title">MINE SAFETY CONTROL</div>
      <div class="subtitle">REAL-TIME MONITORING SYSTEM v3.0</div>
    </div>
  </div>
  <div class="hright">
    <div class="conn-dot" id="connDot"></div>
    <div class="clock" id="clock">--:--:--</div>
    <button class="btn danger-btn" id="muteBtn" onclick="toggleMute()">🔔 SOUND ON</button>
    <button class="btn" onclick="triggerSim()">⚡ SIMULATE</button>
  </div>
</header>

<div class="statbar">
  <div class="stat"><span>👷</span><div><div class="stat-lbl">ACTIVE</div><div class="stat-val" id="sTotal">0</div></div></div>
  <div class="stat"><span>✅</span><div><div class="stat-lbl">SAFE</div><div class="stat-val" id="sSafe">0</div></div></div>
  <div class="stat"><span>⚠️</span><div><div class="stat-lbl">WARNING</div><div class="stat-val yellow" id="sWarn">0</div></div></div>
  <div class="stat"><span>🚨</span><div><div class="stat-lbl">CRITICAL</div><div class="stat-val red" id="sDanger">0</div></div></div>
  <div class="stat"><span>📡</span><div><div class="stat-lbl">OFFLINE</div><div class="stat-val grey" id="sOffline">0</div></div></div>
  <div class="stat"><span>🔄</span><div><div class="stat-lbl">UPDATED</div><div class="stat-val" id="sTime" style="font-size:13px">--</div></div></div>
</div>

<div class="main">
  <div class="miners">
    <div class="sec-hdr">⬡ MINER STATUS</div>
    <div class="grid" id="grid">
      <div class="nodata">
        <div class="nodata-icon">📡</div>
        <h3>AWAITING SIGNAL</h3>
        <p>No helmet data received.<br/>Click <strong>⚡ SIMULATE</strong> to test.</p>
      </div>
    </div>
  </div>

  <div class="sidebar">
    <div class="chartpanel">
      <div class="chtitle">▶ GAS LEVELS (ppm)</div>
      <div class="chbox"><canvas id="gasChart"></canvas></div>
    </div>
    <div class="chartpanel">
      <div class="chtitle">▶ HEART RATE (BPM)</div>
      <div class="chbox"><canvas id="hrChart"></canvas></div>
    </div>
    <div class="logpanel">
      <div class="logtitle">▶ ALERT LOG</div>
      <div id="logBox">
        <div class="logentry info">System initialized<span class="ltime" id="initT"></span></div>
      </div>
    </div>
  </div>
</div>

<script>
// ── CONFIG ──
const API       = window.location.origin;
const REFRESH   = 3000;
const MAX_PTS   = 20;

// ── STATE ──
let miners      = {};
let gasHist     = {};
let hrHist      = {};
let muted       = false;
let audioCtx;
let alarmActive = false;
let alarmTimer  = null;

document.getElementById("initT").textContent = new Date().toLocaleTimeString();

// ── CLOCK ──
setInterval(() => {
  document.getElementById("clock").textContent =
    new Date().toLocaleTimeString("en-US",{hour12:false});
}, 1000);

// ── MUTE ──
function toggleMute() {
  muted = !muted;
  document.getElementById("muteBtn").textContent = muted ? "🔕 SOUND OFF" : "🔔 SOUND ON";
  if (muted) stopAlarm();
}

// ── ALARM SOUND (loud, repeating) ──
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playBeep(freq, start, dur, vol=0.3) {
  const osc  = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  const dist = audioCtx.createWaveShaper();  // slight distortion for harshness

  function makeDistCurve(amount) {
    const n=256, curve=new Float32Array(n);
    for (let i=0;i<n;i++){const x=i*2/n-1; curve[i]=(Math.PI+amount)*x/(Math.PI+amount*Math.abs(x));}
    return curve;
  }
  dist.curve = makeDistCurve(80);

  osc.connect(dist); dist.connect(gain); gain.connect(audioCtx.destination);
  osc.type = "sawtooth";
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0, audioCtx.currentTime + start);
  gain.gain.linearRampToValueAtTime(vol, audioCtx.currentTime + start + 0.02);
  gain.gain.setValueAtTime(vol, audioCtx.currentTime + start + dur - 0.05);
  gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + start + dur);
  osc.start(audioCtx.currentTime + start);
  osc.stop(audioCtx.currentTime + start + dur);
}

function playSingleAlarm() {
  initAudio();
  // 3-tone siren: high-low-high
  playBeep(1200, 0.00, 0.18, 0.35);
  playBeep(800,  0.20, 0.18, 0.35);
  playBeep(1200, 0.40, 0.18, 0.35);
  playBeep(800,  0.60, 0.18, 0.35);
  playBeep(1400, 0.80, 0.25, 0.4);
}

function startAlarm() {
  if (alarmActive || muted) return;
  alarmActive = true;
  playSingleAlarm();
  // Repeat every 4 seconds while danger exists
  alarmTimer = setInterval(() => {
    if (!muted) playSingleAlarm();
  }, 4000);
}

function stopAlarm() {
  alarmActive = false;
  if (alarmTimer) { clearInterval(alarmTimer); alarmTimer = null; }
}

// ── HELPERS ──
function gasClass(v)  { return v>=600?"danger":v>=300?"warn":"safe"; }
function hrClass(v,on){ if(!on) return "grey"; return v>140||v<40?"danger":v>120||v<50?"warn":"safe"; }
function tmpClass(v)  { return v>40?"danger":v>35?"warn":"safe"; }
function healthColor(s){ return s>=70?"#00e676":s>=40?"#ffca28":"#ff1744"; }
function fmt(ts)      { try{return new Date(ts).toLocaleTimeString("en-US",{hour12:false})}catch{return "--"} }

// ── LOG ──
function addLog(text, level="info") {
  const box = document.getElementById("logBox");
  const e   = document.createElement("div");
  e.className = `logentry ${level}`;
  e.innerHTML = `${text}<span class="ltime">${new Date().toLocaleTimeString()}</span>`;
  box.prepend(e);
  while (box.children.length > 60) box.removeChild(box.lastChild);
}

// ── CHARTS ──
const chartOpts = {
  responsive:true, maintainAspectRatio:false,
  animation:{duration:300},
  plugins:{legend:{display:false}},
  scales:{
    x:{ticks:{color:"#3a6880",font:{family:"Share Tech Mono",size:7}},grid:{color:"rgba(14,54,84,.4)"}},
    y:{ticks:{color:"#3a6880",font:{family:"Share Tech Mono",size:7}},grid:{color:"rgba(14,54,84,.4)"}}
  }
};

const gasChart = new Chart(document.getElementById("gasChart").getContext("2d"), {
  type:"line", options:{...chartOpts, scales:{...chartOpts.scales, y:{...chartOpts.scales.y, suggestedMin:0, suggestedMax:1000}}},
  data:{labels:[],datasets:[{data:[],borderColor:"#ff6d00",backgroundColor:"rgba(255,109,0,.07)",borderWidth:1.5,pointRadius:2,tension:.4,fill:true}]}
});
const hrChart = new Chart(document.getElementById("hrChart").getContext("2d"), {
  type:"line", options:{...chartOpts, scales:{...chartOpts.scales, y:{...chartOpts.scales.y, suggestedMin:40, suggestedMax:160}}},
  data:{labels:[],datasets:[{data:[],borderColor:"#f50057",backgroundColor:"rgba(245,0,87,.07)",borderWidth:1.5,pointRadius:2,tension:.4,fill:true}]}
});

function updateCharts() {
  const ids = Object.keys(miners);
  if (!ids.length) return;
  const times=[], gVals=[], hVals=[];
  const now = Date.now();
  for (let i=0; i<MAX_PTS; i++) {
    let tg=0, th=0, cnt=0;
    ids.forEach(id => {
      const g=(gasHist[id]||[])[i], h=(hrHist[id]||[])[i];
      if(g!==undefined){tg+=g;cnt++;}
      if(h!==undefined) th+=h;
    });
    if(cnt>0){
      const t=new Date(now-(MAX_PTS-i)*REFRESH);
      times.push(t.toLocaleTimeString("en-US",{hour12:false,second:"2-digit",minute:"2-digit"}));
      gVals.push(Math.round(tg/cnt));
      hVals.push(Math.round(th/cnt));
    }
  }
  gasChart.data.labels=times; gasChart.data.datasets[0].data=gVals; gasChart.update("none");
  hrChart.data.labels=times;  hrChart.data.datasets[0].data=hVals;  hrChart.update("none");
}

// ── DISMISS ──
async function dismissAlerts(minerId) {
  try {
    await fetch(`${API}/acknowledge/${minerId}`, {method:"POST"});
    if (miners[minerId]) {
      miners[minerId].alerts     = [];
      miners[minerId].alertAcked = true;
    }
    addLog(`✓ Alerts acknowledged for ${minerId}`, "ack");
    renderAll();
    // Check if any danger still active after dismiss
    checkAlarmState();
  } catch(e) {
    addLog(`Dismiss failed: ${e.message}`, "warn");
  }
}

function checkAlarmState() {
  const hasDanger = Object.values(miners).some(m =>
    m.isOnline && !m.alertAcked &&
    m.alerts && m.alerts.length > 0 &&
    m.alerts.some(a => a.startsWith("DANGER"))
  );
  if (!hasDanger) stopAlarm();
}

// ── RENDER CARD ──
function renderCard(m) {
  const id       = m.minerID;
  const online   = m.isOnline !== false;
  const status   = online ? (m.workingStatus || "UNKNOWN") : "OFFLINE";
  const dl       = m.dangerLevel || "SAFE";
  const hs       = m.healthScore || 0;
  const alerts   = (m.alerts || []).filter(Boolean);
  const acked    = m.alertAcked || false;
  const fingerOn = m.fingerOn !== false && m.hrStatus !== "NO_CONTACT";
  const sAgo     = m.secondsAgo || 0;

  const cardCls  = !online ? "offline" : dl==="DANGER"?"danger":dl==="WARNING"?"warn":"";
  const hc       = healthColor(hs);

  // HR display
  let hrDisplay, hrCls;
  if (!online) {
    hrDisplay = "---"; hrCls = "grey";
  } else if (!fingerOn) {
    hrDisplay = "NO CONTACT"; hrCls = "grey";
  } else {
    hrDisplay = m.heartRate; hrCls = hrClass(m.heartRate, true);
  }

  // Alert tags
  let alertHTML = "";
  if (!acked && alerts.length) {
    alertHTML = alerts.map(a => {
      const isDanger = a.startsWith("DANGER");
      return `<span class="atag ${isDanger?'':'warn-tag'}">${isDanger?"🔴":"🟡"} ${a}</span>`;
    }).join("");
  }

  // Dismiss / acked display
  let actionHTML = "";
  if (!online) {
    actionHTML = `<div class="offline-msg">📡 SIGNAL LOST — ${sAgo}s ago</div>`;
  } else if (alerts.length && !acked) {
    actionHTML = `<button class="dismiss-btn" onclick="dismissAlerts('${id}')">✓ ACKNOWLEDGE &amp; DISMISS ALERTS</button>`;
  } else if (acked) {
    actionHTML = `<div class="acked-badge">✓ ALERTS ACKNOWLEDGED</div>`;
  }

  return `
  <div class="card ${cardCls}" id="card-${id}">
    <div class="card-top">
      <div class="miner-id">${id.toUpperCase()}</div>
      <div class="badge ${status}">${status}</div>
    </div>
    <div class="metrics">
      <div class="metric">
        <div class="mlbl">🌡 TEMP</div>
        <div class="mval ${online?tmpClass(m.temperature):'grey'}">${online?m.temperature:'--'}<span class="munit">°C</span></div>
      </div>
      <div class="metric">
        <div class="mlbl">💨 GAS</div>
        <div class="mval ${online?gasClass(m.gas):'grey'}">${online?m.gas:'--'}<span class="munit">ppm</span></div>
      </div>
      <div class="metric">
        <div class="mlbl">❤ HEART RATE</div>
        <div class="mval ${hrCls}" style="${!fingerOn&&online?'font-size:10px;margin-top:5px':''}">
          ${hrDisplay}${fingerOn&&online?`<span class="munit">bpm</span>`:''}
        </div>
      </div>
      <div class="metric">
        <div class="mlbl">💧 HUMIDITY</div>
        <div class="mval">${online?m.humidity:'--'}<span class="munit">%</span></div>
      </div>
    </div>
    <div class="hbar-wrap">
      <div class="hbar-hdr"><span>HEALTH SCORE</span><span style="color:${hc};font-size:10px;font-weight:bold">${hs}/100</span></div>
      <div class="hbar-track"><div class="hbar-fill" style="width:${hs}%;background:linear-gradient(90deg,${hc}88,${hc})"></div></div>
    </div>
    ${alertHTML ? `<div class="alert-row">${alertHTML}</div>` : ""}
    ${m.fallDetected && online ? `<div class="alert-row"><span class="atag">🔴 FALL DETECTED</span></div>` : ""}
    ${actionHTML}
    <div class="ts">LAST: ${fmt(m.timestamp)} ${online?'':`· OFFLINE`}</div>
  </div>`;
}

function renderAll() {
  const grid = document.getElementById("grid");
  const list = Object.values(miners);
  if (!list.length) {
    grid.innerHTML = `<div class="nodata"><div class="nodata-icon">📡</div><h3>AWAITING SIGNAL</h3><p>No data yet. Click ⚡ SIMULATE to test.</p></div>`;
    return;
  }
  grid.innerHTML = list.map(renderCard).join("");
}

function updateStats() {
  const list    = Object.values(miners);
  const online  = list.filter(m => m.isOnline !== false);
  const offline = list.filter(m => m.isOnline === false);
  const safe    = online.filter(m => m.dangerLevel==="SAFE").length;
  const warn    = online.filter(m => m.dangerLevel==="WARNING").length;
  const danger  = online.filter(m => m.dangerLevel==="DANGER"||m.workingStatus==="CRITICAL").length;

  document.getElementById("sTotal").textContent   = online.length;
  document.getElementById("sSafe").textContent    = safe;
  document.getElementById("sWarn").textContent    = warn;
  document.getElementById("sDanger").textContent  = danger;
  document.getElementById("sOffline").textContent = offline.length;
  document.getElementById("sTime").textContent    = new Date().toLocaleTimeString("en-US",{hour12:false});
  document.getElementById("connDot").style.background = online.length>0?"var(--safe)":"var(--dim)";
}

// ── FETCH LOOP ──
async function fetchAndUpdate() {
  try {
    const resp = await fetch(`${API}/latest`);
    if (!resp.ok) return;
    const data = await resp.json();
    const list = data.miners || [];

    let newDanger = false;

    list.forEach(m => {
      const id   = m.minerID;
      const prev = miners[id];
      miners[id] = m;

      // History
      gasHist[id] = gasHist[id] || [];
      hrHist[id]  = hrHist[id]  || [];
      if (m.isOnline !== false) {
        gasHist[id].push(m.gas || 0);
        hrHist[id].push(m.heartRate || 0);
        if (gasHist[id].length > MAX_PTS) gasHist[id].shift();
        if (hrHist[id].length  > MAX_PTS) hrHist[id].shift();
      }

      // Log new alerts
      if (m.isOnline !== false && m.alerts && m.alerts.length) {
        const prevKey = prev ? (prev.alerts||[]).join("|") : "";
        const newKey  = m.alerts.join("|");
        if (newKey !== prevKey) {
          m.alerts.forEach(a => {
            const isDanger = a.startsWith("DANGER");
            addLog(`[${id}] ${a}`, isDanger?"danger":"warn");
            if (isDanger && !m.alertAcked) newDanger = true;
          });
        }
      }

      // Log newly offline
      if (prev && prev.isOnline !== false && m.isOnline === false) {
        addLog(`[${id}] SIGNAL LOST — device offline`, "danger");
      }

      // Log came back online
      if (prev && prev.isOnline === false && m.isOnline !== false) {
        addLog(`[${id}] Signal restored — device back online`, "ack");
      }
    });

    renderAll();
    updateStats();
    updateCharts();

    if (newDanger && !muted) startAlarm();
    else checkAlarmState();

  } catch(e) {
    addLog(`Connection error: ${e.message}`, "warn");
  }
}

async function triggerSim() {
  try {
    const r = await fetch(`${API}/simulate`,{method:"POST"});
    const d = await r.json();
    addLog(`Simulated: ${d.simulated.join(", ")}`, "info");
    await fetchAndUpdate();
  } catch(e) {
    addLog("Simulate failed — server running?","danger");
  }
}

fetchAndUpdate();
setInterval(fetchAndUpdate, REFRESH);
</script>

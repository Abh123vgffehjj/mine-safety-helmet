services:
  - type: web
    name: mine-safety-helmet
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: MONGO_URI
        sync: false        # Set in Render dashboard → Environment
      - key: PORT
        value: 10000
